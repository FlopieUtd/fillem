<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <script>
      // Redirect to the SPA with the original path encoded as a query param
      const path = window.location.pathname + window.location.search + window.location.hash;
      window.location.replace(window.location.origin + "/media/?p=" + encodeURIComponent(path));
    </script>
  </head>
</html>
